<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather</title>
    <style>
    body{
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: cadetblue;
    }

    main {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #container{
        background-color: #f0f0f0;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      font-family:'Times New Roman', Times, serif;
      color: black;
    }

    .number {
      font-size: 5rem;
      font-weight: bold;
      font-family: 'Courier New', Courier, monospace;
    }

    .forecast{
        font-size: 1rem;
        margin-top: 10px;
        color: #333;
        font-family:'Times New Roman', Times, serif;
    }

    #weather-output {
      margin-top: 20px;
      font-size: 2rem;
      color: blue;
      text-align: center;
    }

    .temp {
      font-size: 3rem;
      font-weight: bold;
    }

    .loading{
        color: grey;
    }

    .error{
        color: red;
    }


    </style>
    <script src="./scripts/weather.js" defer></script>
  </head>
  <body>
    <main>
        <h1>Missoula Weather</h1>
        <div id="container">
        <div id = "weather-output"></div>
        </div>
    </main>
  </body>
